<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sticky Kanban — Admin</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <script>
    try {
      if (localStorage.getItem('theme') === 'dark') document.documentElement.dataset.theme = 'dark';
      const f = localStorage.getItem('font');
      if (f) document.documentElement.dataset.font = f;
    } catch (e) {}
  </script>
</head>
<body class="app-body">
  <header class="topbar">
    <h1 class="brand">sticky<span>kanban</span> · admin</h1>
    <div class="topbar-right">
      <a href="/" class="ghost-btn">← Back</a>
      <button id="logout-btn" class="ghost-btn">Sign out</button>
    </div>
  </header>
  <main class="admin-main">
    <div class="admin-summary" id="admin-summary"></div>
    <table class="admin-table">
      <thead>
        <tr>
          <th>User</th>
          <th>Created</th>
          <th>Last login</th>
          <th>Boards</th>
          <th>Notes</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="admin-tbody"></tbody>
    </table>
    <p class="admin-error" id="admin-error" hidden></p>
  </main>
  <script src="/admin.js"></script>
</body>
</html>
